mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: false
enable-process: true
find-process-mode: strict
tcp-concurrent: false
unified-delay: true
global-client-fingerprint: chrome
keep-alive-interval: 25
profile:
  store-selected: true
  store-fake-ip: true
dns:
  enable: true
  ipv6: true
  listen: :53
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - +.lan
    - +.local
    - +.localhost
    - +.localdomain
    - +.ip6-localhost
    - +.ip6-loopback
    - "*.example"
    - "*.invalid"
    - "*.test"
    - "*.home.arpa"
    - time.nist.gov
    - time.windows.com
    - time.android.com
    - pool.ntp.org
    - time.*.com
    - ntp.*.com
  default-nameserver:
    - https://8.8.8.8/dns-query
  direct-nameserver:
    - https://dns.google/dns-query
    - https://free.shecan.ir/dns-query
  nameserver:
    - https://dns.quad9.net/dns-query
    - https://security.cloudflare-dns.com/dns-query
    - https://dns.google/dns-query
  proxy-server-nameserver:
    - https://dns.umbrella.com/dns-query
    - https://dns.google/dns-query
    - https://dns.adguard-dns.com/dns-query
    - system
  direct-nameserver-follow-policy: false
  prefer-h3: false
  respect-rules: false
  use-hosts: true
  use-system-hosts: true
tun:
  enable: true
  stack: system
  dns-hijack:
    - any:53
  auto-route: true
  auto-detect-interface: true
  strict-route: true
  device: Mihomo
sniffer:
  enable: true
  parse-pure-ip: true
  override-destination: false
  sniff:
    HTTP:
      ports:
        - 1-442
        - 444-8442
        - 8444-65535
      override-destination: true
    TLS:
      ports:
        - 1-79
        - 81-8079
        - 8881-65535
    QUIC:
      ports:
        - "443"
        - "8443"
  force-domain:
    - www.gstatic.com
